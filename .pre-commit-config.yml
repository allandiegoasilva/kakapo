
repos:
  # 1. Standard Language-Agnostic Hooks (Fixed Repo URL)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files

  # 3. Dedicated Go Module Mod-Tidy Check
  # (Keeps go.mod and go.sum updated without overlapping golangci-lint)
  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: v1.0.0-rc.1
    hooks:
      - id: go-mod-tidy

  # 4. Monolithic Go Linting Suite
  # Handles formatters (gofmt/gofumpt) and checks (govet/staticcheck) seamlessly
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint

  # 5. Conventional Commits Enforcer
  - repo: https://github.com
    rev: v9.20.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
