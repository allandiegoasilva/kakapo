repos:
  # 1. Standard Language-Agnostic Hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files

  # 3. Dedicated Go Module Mod-Tidy Check
  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: v1.0.0-rc.1
    hooks:
      - id: go-mod-tidy

  # 4. Monolithic Go Linting Suite
  - repo: https://github.com/golangci/golangci-lint
    rev: v1.64.7  # Atualizado para a versão estável real
    hooks:
      - id: golangci-lint

  # 5. Conventional Commits Enforcer
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.22.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
